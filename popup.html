<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Judol Detector</title>
</head>
<body>
  <div id="app">
    <!-- Blur Toggle -->
    <div class="toggle-container">
      <input type="checkbox" id="blur-toggle">
      <span class="toggle-text">Blur Konten Judol</span>
    </div>

    <!-- Header -->
    <header>
      <h1>Judol Detector</h1>
      <div class="button-group">
        <button id="scan-btn">Scan Page</button>
        <button id="clear-btn">Clear</button>
      </div>
    </header>

    <!-- Statistik total -->
    <section id="stats">
      <div id="total-count">No Match Found</div>
    </section>

    <!-- Visualisasi perbandingan antar algoritma -->
    <section id="chart-section">
      <h2>Keyword Matches Visualization</h2>
      <div id="chart-container">
      </div>
    </section>

    <!-- Waktu eksekusi -->
    <section id="timing-section">
      <h2>Execution Time</h2>
      <div id="table-container">
      </div>
    </section>
  </div>
  <script type="module" src="/src/popup/popup.ts"></script>
</body>
</html>
